# shiny-server.conf — PugaX Trade
# Optimizado para producción en Dokploy/Hostinger

run_as shiny;

server {
  listen 3838;

  # Tiempo máximo para cargar la app (paquetes al inicio)
  app_init_timeout 300;

  # Sesiones inactivas se cierran en 20 minutos a nivel servidor
  # El timer JS de la app ya hace logout a los 31 min — este es el backstop
  app_idle_timeout 1200;

  # Re-conexión automática en micro-cortes de red
  reconnect true;

  # PRODUCCIÓN: Ocultar tracebacks de R al usuario final
  sanitize_errors true;

  location / {
    # app_dir (no site_dir): todas las rutas se pasan a app.R
    # Necesario para que req$PATH_INFO funcione en /auth/set-session, /auth/logout, /webhook
    app_dir /srv/shiny-server/app;
    log_dir /var/log/shiny-server;

    # No exponer listado de directorios
    directory_index off;
  }
}
