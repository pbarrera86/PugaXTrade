# shiny-server.conf — PugaX Trade — Optimizado para Concurrencia
run_as shiny;

# Definimos el puerto (3838 es el estándar para Docker/Dokploy)
server {
  listen 3838;

  # Tiempo máximo para cargar la app (útil cuando hay muchos paquetes al inicio)
  app_init_timeout 180;

  # Permitimos que la sesión se mantenga activa durante cálculos largos (ExtendedTask)
  app_idle_timeout 0;

  # Re-conexión automática en caso de micro-cortes de red
  reconnect true;

  # DESCARGAR ERRORES: Pon esto en 'false' si quieres ver los errores reales en pantalla en lugar de "An error has occurred"
  sanitize_errors false;

  location / {
    site_dir /srv/shiny-server;
    log_dir /var/log/shiny-server;
    directory_index on;
  }

  # Soporte opcional para ruta /pugaxtrade
  location /pugaxtrade {
    site_dir /srv/shiny-server;
    log_dir /var/log/shiny-server;
  }
}
