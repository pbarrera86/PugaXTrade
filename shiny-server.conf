# shiny-server.conf — PugaX Trade
run_as shiny;

server {
  listen 3838;

  # Responde en /pugaxtrade/ (el path que expone Traefik)
  location /pugaxtrade {
    site_dir /srv/shiny-server;
    log_dir  /var/log/shiny-server;
    app_idle_timeout 0;
    reconnect TRUE;
  }

  # Redirige la raíz a /pugaxtrade/ por si alguien entra sin path
  location / {
    site_dir /srv/shiny-server;
    log_dir  /var/log/shiny-server;
    app_idle_timeout 0;
    reconnect TRUE;
  }
}
