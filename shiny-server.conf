# shiny-server.conf — Modo single-app en la raíz del servidor
# Coloca este archivo en: /etc/shiny-server/shiny-server.conf
# (el Dockerfile lo reemplaza automáticamente si lo copias junto con tu app)

run_as shiny;

server {
  listen 3838;

  # Sirve toda la carpeta como una sola app Shiny
  location / {
    site_dir /srv/shiny-server;
    log_dir  /var/log/shiny-server;

    # Tiempo de espera para análisis largos (tickers pesados)
    app_idle_timeout 0;
    reconnect TRUE;
  }
}
