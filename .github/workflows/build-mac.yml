name: build-mac
on:
  workflow_dispatch: {}

jobs:
  mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt

      # Opcional: smoke test para validar imports (no detiene el job si falla)
      - name: Smoke test (CLI)
        run: |
          python Analisis_Financiero_FINVIZ_v6.py || true

      - name: Build .app with PyInstaller
        run: |
          # --windowed: app sin consola
          # --name: nombre de la app
          # --icon: icono .icns (si existe)
          # --add-data: recursos (en macOS usa ':')
          PYI_EXTRA=""
          if [ -f "tickers.txt" ]; then
            PYI_EXTRA='--add-data "tickers.txt:."'
          fi
          ICON_OPT=""
          if [ -f "pugax.icns" ]; then
            ICON_OPT='--icon pugax.icns'
          fi

          pyinstaller --windowed --name "PugaX Trade" $ICON_OPT $PYI_EXTRA             --hidden-import lxml._elementpath --hidden-import lxml.etree             Analisis_Financiero_FINVIZ_v6.py

      - name: Make DMG
        run: |
          hdiutil create -volname "PugaX Trade"             -srcfolder "dist/PugaX Trade.app"             -ov -format UDZO "dist/PugaX_Trade.dmg"

      - name: Upload artifacts (.app and .dmg)
        uses: actions/upload-artifact@v4
        with:
          name: PugaX-mac-build
          path: |
            dist/PugaX Trade.app
            dist/PugaX_Trade.dmg
