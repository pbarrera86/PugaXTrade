name: Docker Build Check

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - docker-compose.yml
      - entrypoint.sh
      - shiny-server.conf
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  docker-build:
    name: Verify Docker Image Builds
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: false
          tags: pugaxtrade:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify entrypoint is executable
        run: |
          test -x entrypoint.sh && echo "✅ entrypoint.sh is executable" || echo "⚠️  entrypoint.sh not executable"
