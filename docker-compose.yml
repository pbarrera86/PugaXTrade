    environment:
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}

      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID}
      STRIPE_ALLOW_TEST: ${STRIPE_ALLOW_TEST}

      PGHOST: ${PGHOST}
      PGPORT: ${PGPORT}
      PGDATABASE: ${PGDATABASE}
      PGUSER: ${PGUSER}
      PGPASSWORD: ${PGPASSWORD}
      PGSSLMODE: ${PGSSLMODE}

      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL}   # <-- CORREGIDO AQUI (Izquierda es el nombre dentro de Docker)

    volumes:
      - /root/apps/pugaxtrade:/srv/shiny-server  # <-- LÍNEA MAGICA AGREGADA AQUI
      - shiny_logs:/var/log/shiny-server
