# ── PugaX Trade — docker-compose.yml ─────────────────────────────────────────
services:
  pugaxtrade:
    build:
      context: .
      dockerfile: Dockerfile
    image: pugaxtrade:latest
    container_name: pugaxtrade_app
    restart: unless-stopped

    ports:
      - "3838:3838"

    networks:
      - dokploy-network

    environment:
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}

      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID}
      STRIPE_ALLOW_TEST: ${STRIPE_ALLOW_TEST}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}

      PGHOST: ${PGHOST}
      PGPORT: ${PGPORT}
      PGDATABASE: ${PGDATABASE}
      PGUSER: ${PGUSER}
      PGPASSWORD: ${PGPASSWORD}
      PGSSLMODE: ${PGSSLMODE}

      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_ADMIN: ${SMTP_ADMIN_EMAIL}

      # Seguridad: Admin y config de negocio fuera del código fuente
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
      DEFAULT_REFERRER_USERNAME: ${DEFAULT_REFERRER_USERNAME}
      REFERRAL_COMMISSION_AMOUNT: ${REFERRAL_COMMISSION_AMOUNT:-9.00}

    volumes:
      - shiny_logs:/var/log/shiny-server
      - /root/apps/pugaxtrade:/srv/shiny-server/app

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -H 'Host: localhost' http://127.0.0.1:3838/ping.html >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  shiny_logs:

networks:
  dokploy-network:
    external: true
